name: Déploiement SFTP (lepadrino.fr)

# Déploie automatiquement le contenu du dossier Padrino/ vers l'hébergeur
# en SFTP (chiffré, via SSH) à chaque push sur main.
# Peut aussi être lancé manuellement (onglet Actions → Run workflow).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: sftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Déployer par SFTP (fichiers visibles)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || 22 }}
          # Contenu du site (dossier Padrino/)
          local_path: './Padrino/*'
          # Racine web sur le serveur (souvent /www/ chez OVH, /public_html/ en cPanel)
          remote_path: ${{ secrets.FTP_SERVER_DIR || './' }}
          sftp_only: true

      - name: Déployer les fichiers cachés (.htaccess)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || 22 }}
          # Les fichiers commençant par un point (ex. .htaccess) ne sont pas pris
          # par le glob '*' ci-dessus, on les envoie séparément.
          local_path: './Padrino/.htaccess'
          remote_path: ${{ secrets.FTP_SERVER_DIR || './' }}
          sftp_only: true
